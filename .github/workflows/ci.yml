name: Rust Continuous Integration

# どのタイミングで自動実行するかを指定
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build, Test and Lint
    runs-on: ubuntu-latest # 最新のUbuntu環境をクラウド上に使い捨てで用意

    steps:
    # 1. GitHubからコードをチェックアウト
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Rustのツールチェーン（stable）をインストール
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    # 3. ビルドを高速化するためにキャッシュを利用（2回目以降が爆速になります）
    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    # 4. コードの静的解析（警告やバグの元を検知）を実行
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    # 5. すべてのユニットテスト・結合テストを実行
    - name: Run Tests
      run: cargo test --all-features --workspace
